<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giriş Yap | InsightAI</title>
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/auth.css">
</head>
<body>

    <div class="topbar">
        <div class="logo">
            <div class="logo-dot"></div>
            InsightAI
        </div>
    </div>

    <div class="glow-ring"></div>

    <div class="page">
        <h1 class="headline">Hoş Geldin!</h1>

        <div class="login-bar">
            <div class="main-bar">
                <div class="field-group">
                    <span class="flabel">E-POSTA</span>
                    <input type="email" placeholder="mail@adresin.com">
                </div>
                <div class="field-group">
                    <span class="flabel">ŞİFRE</span>
                    <input type="password" placeholder="••••••••">
                </div>
                <button class="login-btn">Giriş Yap</button>
            </div>

            <div class="helpers">
                <a href="#">Şifremi unuttum</a>
                <a href="#">Hesap oluştur</a>
            </div>
        </div>
    </div>

    <div class="octopus-wrap">
        <img src="assets/octopus.png" alt="Ollie the Octopus">
    </div>

</body>
</html>
